name: REBOUND (function prefix checker)

on: [push, pull_request]

jobs:
  build:

    name: Linting all C files 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Build rebound
        run: make -j 24 
      - name: Check simulation.o 
        run: bash .github/function_prefix_checker.bash src/simulation.o
